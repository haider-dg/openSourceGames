<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="player-container" id="player">
        <video id="video-element" poster="video-banner.webp">
            <source src="intro.mp4" type="video/mp4">
            <!-- Subtitle track starts here -->
            <track src="basic-subtitles.vtt" id="captionTrack" kind="subtitles" srclang="en" label="English" default>
            Your browser does not support the video tag.
        </video>
        <!-- skip-forward
skip-back -->
        <!-- Clickable Overlay Zones -->
        <div class="click-overlay">
            <div class="seek-zone left" id="left-seek">
                <div class="seek-indicator">
                    <i data-lucide="rewind"></i>
                    <span>10s</span>
                </div>
            </div>
            <div class="seek-zone middle" id="middle-section">
                <!-- <div id='middle-controls'> -->

                    <button class="skip-btn" id="skip-back">
                        <i data-lucide="skip-back"></i>
                    </button>

                    <button class="skip-btn" id="center-feedback">
                        <i data-lucide="play" id="center-icon"></i>
                    </button>

                    <button class="skip-btn" id="skip-forward">
                        <i data-lucide="skip-forward"></i>
                    </button>
                <!-- </div> -->
            </div>
            <div class="seek-zone right" id="right-seek">
                <div class="seek-indicator">
                    <i data-lucide="fast-forward"></i>
                    <span>10s</span>
                </div>
            </div>
        </div>

        <!-- Central Play/Pause Toggle Feedback -->
        <!-- <div class="center-feedback" id="center-feedback">
            <i data-lucide="play" id="center-icon"></i>
        </div> -->

        <!-- Controls Bar -->
        <div class="controls-overlay">
            <div class="progress-container" id="progress-container">
                <div class="progress-bar">
                    <div class="progress-buffer"></div>
                    <div class="progress-current" id="progress-current"></div>
                    <div class="progress-knob" id="progress-knob"></div>
                </div>
            </div>

            <div class="controls-main">
                <div class="controls-left">
                    <button class="control-btn" id="play-pause-btn" aria-label="Play/Pause">
                        <i data-lucide="play"></i>
                    </button>
                    <div class="time-display">
                        <span id="current-time">0:00</span>
                        <span class="time-separator">/</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="controls-right">
                    <button class="control-btn" id="mute-btn" aria-label="Mute">
                        <i data-lucide="volume-2"></i>
                    </button>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.1" value="1">
                    <button class="control-btn" id="cc-btn" disabled="true" aria-label="Sub Titles" title="captions">
                        <i data-lucide="closed-caption"></i>
                    </button>
                    <button class="control-btn" id="settings-btn" aria-label="Sub Titles">
                        <i data-lucide="settings"></i>
                    </button>
                    <button class="control-btn" id="fullscreen-btn" aria-label="Fullscreen">
                        <i data-lucide="maximize"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
