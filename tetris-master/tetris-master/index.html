<!DOCTYPE html>
<html>

<head>
    <title>HTML5 Tetris</title>
    <link rel='stylesheet' href='style.css' />
</head>

<body>
    <audio id="clearsound" src="sound/pop.ogg" preload="auto"></audio>
    <audio id="bg-sound" src="tetris-bg-sound.mp3" loop></audio>

    <div id="game-container">
        <div id="score-board">
            <span>Score: <span id="score">0</span></span>
            <button id="sound-toggle" class="sound-toggle" aria-label="Toggle Sound">
                <svg id="sound-on-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor"
                        d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                </svg>
                <svg id="sound-off-icon" viewBox="0 0 24 24" width="24" height="24" style="display:none;">
                    <path fill="currentColor"
                        d="M12,4L9.91,6.09L12,8.18V4M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.45 16.63,19.82 17.68,18.96L19.73,21L21,19.73L12,10.73L4.27,3M19,12C19,12.94 18.8,13.82 18.46,14.64L19.97,16.15C20.62,14.91 21,13.5 21,12C21,7.72 18.03,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,10.23 15.5,8.71 14,7.97V10.18L16.45,12.63C16.48,12.43 16.5,12.22 16.5,12Z" />
                </svg>
            </button>
        </div>
        <div id="canvas-wrapper">
            <canvas width='300' height='600'></canvas>
            <div id="overlay">
                <div id="start-screen" class="screen">
                    <h1>TETRIS</h1>
                    <button class="btn" onclick="playButtonClicked();">Start Game</button>
                </div>
                <div id="game-over-screen" class="screen hidden">
                    <h1>GAME OVER</h1>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <button class="btn" onclick="restartGame();">Restart</button>
                </div>
            </div>
        </div>
    </div>

    <script src='js/tetris.js'></script>
    <script src='js/controller.js'></script>
    <script src='js/render.js'></script>
</body>

</html>
